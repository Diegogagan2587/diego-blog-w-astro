<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Install PostgreSQL on Arch Linux</title>
  <desc id="desc">Illustration showing Arch Linux terminal steps to install and start PostgreSQL for local development.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="55%" stop-color="#10233b"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="560" r="180" fill="#38bdf8" opacity="0.18"/>
  <circle cx="1080" cy="80" r="140" fill="#22d3ee" opacity="0.16"/>

  <text x="70" y="94" fill="#e2e8f0" font-family="'Segoe UI', Tahoma, sans-serif" font-size="46" font-weight="700">
    PostgreSQL on Arch Linux
  </text>
  <text x="70" y="132" fill="#bae6fd" font-family="'Segoe UI', Tahoma, sans-serif" font-size="24" font-weight="500">
    Odin-style local setup in a few commands
  </text>

  <g transform="translate(70 180)">
    <rect x="0" y="0" width="730" height="360" rx="20" fill="url(#terminal)" stroke="#334155" stroke-width="2"/>
    <circle cx="28" cy="24" r="7" fill="#ef4444"/>
    <circle cx="50" cy="24" r="7" fill="#f59e0b"/>
    <circle cx="72" cy="24" r="7" fill="#22c55e"/>
    <text x="98" y="30" fill="#94a3b8" font-family="monospace" font-size="18">arch-terminal</text>

    <text x="28" y="84" fill="#67e8f9" font-family="monospace" font-size="28">$ sudo pacman -S postgresql</text>
    <text x="28" y="126" fill="#cbd5e1" font-family="monospace" font-size="24">$ sudo -iu postgres</text>
    <text x="28" y="164" fill="#cbd5e1" font-family="monospace" font-size="24">$ initdb --locale=en_US.UTF-8 -D /var/lib/postgres/data</text>
    <text x="28" y="208" fill="#cbd5e1" font-family="monospace" font-size="24">$ sudo systemctl enable --now postgresql</text>
    <text x="28" y="250" fill="#22c55e" font-family="monospace" font-size="24">$ psql</text>
    <text x="28" y="286" fill="#86efac" font-family="monospace" font-size="22">psql (16.x) - ready for local dev</text>

    <rect x="28" y="308" width="188" height="30" rx="15" fill="#0f766e"/>
    <text x="52" y="329" fill="#ccfbf1" font-family="'Segoe UI', Tahoma, sans-serif" font-size="15" font-weight="600">Service running</text>
  </g>

  <g transform="translate(840 218)">
    <rect x="0" y="0" width="290" height="290" rx="22" fill="#0b1220" stroke="#475569" stroke-width="2"/>
    <text x="26" y="44" fill="#93c5fd" font-family="'Segoe UI', Tahoma, sans-serif" font-size="24" font-weight="700">Setup Flow</text>

    <rect x="26" y="64" width="238" height="44" rx="10" fill="#1f2937"/>
    <text x="42" y="92" fill="#e2e8f0" font-family="'Segoe UI', Tahoma, sans-serif" font-size="17">Install package</text>

    <rect x="26" y="120" width="238" height="44" rx="10" fill="#1f2937"/>
    <text x="42" y="148" fill="#e2e8f0" font-family="'Segoe UI', Tahoma, sans-serif" font-size="17">Init DB cluster</text>

    <rect x="26" y="176" width="238" height="44" rx="10" fill="#1f2937"/>
    <text x="42" y="204" fill="#e2e8f0" font-family="'Segoe UI', Tahoma, sans-serif" font-size="17">Enable service</text>

    <rect x="26" y="232" width="238" height="36" rx="10" fill="url(#chip)"/>
    <text x="42" y="255" fill="#082f49" font-family="'Segoe UI', Tahoma, sans-serif" font-size="16" font-weight="700">Create user + psql</text>
  </g>

  <path d="M807 360 C830 360, 836 360, 845 360" fill="none" stroke="#67e8f9" stroke-width="8" stroke-linecap="round"/>
  <polygon points="845,360 826,348 826,372" fill="#67e8f9"/>
</svg>
