<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Rails Tailwind Watch Process</title>
  <desc id="desc">Illustration of Rails Tailwind CSS watch command updating styles in a browser.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111a33"/>
      <stop offset="100%" stop-color="#1a2a4f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="160" cy="100" r="130" fill="#1d4ed8" opacity="0.18"/>
  <circle cx="1080" cy="560" r="220" fill="#14b8a6" opacity="0.16"/>

  <text x="80" y="110" fill="#e2e8f0" font-family="'Segoe UI', Tahoma, sans-serif" font-size="46" font-weight="700">
    Watch Tailwind CSS on Rails
  </text>
  <text x="80" y="150" fill="#93c5fd" font-family="'Segoe UI', Tahoma, sans-serif" font-size="24" font-weight="500">
    Keep styles updating while you code
  </text>

  <g transform="translate(80 200)">
    <rect x="0" y="0" width="670" height="300" rx="20" fill="url(#card)" stroke="#334155" stroke-width="2"/>

    <circle cx="28" cy="24" r="7" fill="#ef4444"/>
    <circle cx="50" cy="24" r="7" fill="#f59e0b"/>
    <circle cx="72" cy="24" r="7" fill="#22c55e"/>

    <text x="96" y="30" fill="#94a3b8" font-family="monospace" font-size="18">terminal</text>

    <text x="30" y="92" fill="#22d3ee" font-family="monospace" font-size="30">$ bin/rails tailwindcss:watch</text>
    <text x="30" y="142" fill="#cbd5e1" font-family="monospace" font-size="24">Done in 130ms</text>
    <text x="30" y="182" fill="#94a3b8" font-family="monospace" font-size="22">Rebuilding...</text>
    <text x="30" y="222" fill="#94a3b8" font-family="monospace" font-size="22">Done in 114ms</text>

    <rect x="30" y="246" width="220" height="28" rx="14" fill="#0f766e" opacity="0.9"/>
    <text x="50" y="266" fill="#ccfbf1" font-family="'Segoe UI', Tahoma, sans-serif" font-size="16" font-weight="600">
      Live watch process running
    </text>
  </g>

  <g transform="translate(800 248)">
    <rect x="0" y="0" width="320" height="208" rx="20" fill="#0b1224" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="20" width="280" height="30" rx="8" fill="#1e293b"/>
    <circle cx="36" cy="35" r="4" fill="#64748b"/>
    <text x="48" y="40" fill="#94a3b8" font-family="'Segoe UI', Tahoma, sans-serif" font-size="14">localhost:3000</text>

    <rect x="20" y="66" width="280" height="120" rx="10" fill="#f8fafc"/>
    <rect x="38" y="84" width="124" height="14" rx="6" fill="#0ea5e9"/>
    <rect x="38" y="108" width="240" height="10" rx="5" fill="#94a3b8"/>
    <rect x="38" y="126" width="210" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="38" y="146" width="170" height="22" rx="11" fill="#14b8a6"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M770 350 C820 350, 835 350, 875 350" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <polygon points="875,350 850,336 850,364" fill="#38bdf8"/>
  </g>
</svg>
